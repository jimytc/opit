name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Package tarball
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          staging="opit-${REF_NAME}-aarch64-apple-darwin"
          mkdir -p "$staging"
          cp target/release/opit "$staging/"
          cp README.md "$staging/"
          tar -czf "$staging.tar.gz" "$staging"

      - name: Package DMG
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          dmg_root="dmg-root"
          mkdir -p "$dmg_root"
          cp target/release/opit "$dmg_root/"
          cp README.md "$dmg_root/"
          hdiutil create -volname "opit" -srcfolder "$dmg_root" -ov -format UDZO \
            "opit-${REF_NAME}-aarch64-apple-darwin.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            opit-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
            opit-${{ github.ref_name }}-aarch64-apple-darwin.dmg

  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Package tarball
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          staging="opit-${REF_NAME}-${TARGET}"
          mkdir -p "$staging"
          cp "target/${TARGET}/release/opit" "$staging/"
          cp README.md "$staging/"
          tar -czf "$staging.tar.gz" "$staging"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts-${{ matrix.target }}
          path: opit-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Publish release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          curated="$(git tag -l --format='%(contents)' "$REF_NAME" | tail -n +2 | sed '/./,$!d')"
          generated="$(gh api -X POST "repos/$REPO/releases/generate-notes" \
            -f tag_name="$REF_NAME" --jq .body)"
          {
            echo "$curated"
            echo
            echo "$generated"
          } > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release create "$REF_NAME" artifacts/* \
            --repo "$REPO" \
            --title "$REF_NAME" \
            --notes-file release-notes.md
